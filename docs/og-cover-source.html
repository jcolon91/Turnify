<!doctype html><html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
.card{position:relative;width:1200px;height:630px;background:#0B1A13;font-family:'Instrument Sans',sans-serif;overflow:hidden}
.glow{position:absolute;inset:0;background:radial-gradient(58% 72% at 84% 20%,rgba(54,226,123,.22),rgba(54,226,123,0) 68%)}
.awn{position:absolute;top:0;left:0;right:0;height:18px;
  background:repeating-linear-gradient(90deg,#36E27B 0 26px,#0d6b46 26px 28px,#0E2218 28px 54px,#10241A 54px 56px)}
.ring{position:absolute;border-radius:50%;border:2px solid rgba(54,226,123,.16)}
.r1{right:-70px;top:70px;width:430px;height:430px}
.r2{right:10px;top:150px;width:270px;height:270px;border-color:rgba(54,226,123,.10)}
.content{position:absolute;left:86px;top:0;height:630px;display:flex;flex-direction:column;justify-content:center}
.lab{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:21px;letter-spacing:.17em;
  color:#8AA197;text-transform:uppercase;margin-bottom:28px}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:142px;line-height:.9;
  letter-spacing:-.045em;color:#ECEAE0}
.logo i{font-style:normal;color:#36E27B}
.tag{font-size:49px;font-weight:500;color:#C9D5CF;margin-top:20px;letter-spacing:-.012em}
.feat{margin-top:36px;font-family:'Spline Sans Mono',monospace;font-size:24px;font-weight:600;
  color:#36E27B;letter-spacing:.01em;display:flex;align-items:center;gap:14px}
.feat span{color:#5d6f66}
.dom{position:absolute;right:86px;bottom:52px;font-family:'Spline Sans Mono',monospace;
  font-size:27px;font-weight:700;color:#36E27B}
</style></head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="ring r1"></div><div class="ring r2"></div>
  <div class="awn"></div>
  <div class="content">
    <div class="lab">Citas &amp; Marketplace · Puerto Rico</div>
    <div class="logo">Buk<i>é</i>ame</div>
    <div class="tag">Tu turno, sin llamadas.</div>
    <div class="feat">ATH Móvil<span>·</span>WhatsApp ilimitado<span>·</span>Cero comisiones</div>
  </div>
  <div class="dom">bukeame.com</div>
</div>
</body></html>

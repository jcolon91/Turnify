<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservar — Turnify</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F1EFE5;--card:#fff;--ink:#17150F;--ink2:#5E594B;--teal:#0E8074;--teal-ink:#0A5B52;--teal-soft:#E3EFE9;--mango:#EFA12F;--line:#E1DCCD;--r:18px;
--display:"Bricolage Grotesque",sans-serif;--body:"Instrument Sans",sans-serif;--mono:"Spline Sans Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font:inherit}
.bootload{min-height:100vh;display:grid;place-items:center;color:var(--ink2);font-size:14px;padding:20px;text-align:center}
.wrap{max-width:620px;margin:0 auto;padding:0 16px}

/* Header del negocio */
.cover{height:150px;position:relative}
.bizhead{margin-top:-44px;position:relative;text-align:center;padding-bottom:8px}
.logo-circle{width:88px;height:88px;border-radius:24px;background:var(--card);border:3px solid var(--paper);margin:0 auto 10px;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:32px;color:var(--teal);box-shadow:0 4px 14px rgba(0,0,0,.1);overflow:hidden}
.logo-circle img{width:100%;height:100%;object-fit:cover}
.bizhead h1{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.02em}
.bizhead .meta{font-size:13px;color:var(--ink2);margin-top:4px}
.bizhead .rating{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--teal-ink);margin-top:6px}

/* Marca Turnify arriba */
.topbar{background:var(--ink);color:#CFC9B6;text-align:center;padding:7px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase}
.topbar b{color:#9FE8D5;font-weight:700}

/* Pasos */
.steps{display:flex;gap:6px;justify-content:center;margin:18px 0 6px}
.step-dot{width:8px;height:8px;border-radius:99px;background:var(--line)}
.step-dot.on{background:var(--teal);width:22px}

.seclabel{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin:22px 0 12px;text-align:center}

/* Servicios */
.svc{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:15px 16px;display:flex;align-items:center;gap:13px;margin-bottom:10px;cursor:pointer;transition:.15s}
.svc:hover{border-color:var(--teal)}
.svc.sel{border-color:var(--teal);background:var(--teal-soft)}
.svc .grow{flex:1;min-width:0}
.svc h4{font-size:15.5px;font-weight:700}
.svc p{font-size:12.5px;color:var(--ink2);margin-top:3px}
.svc .price{text-align:right;flex:none}
.svc .price b{font-family:var(--display);font-weight:800;font-size:17px;color:var(--teal-ink)}
.svc .price span{display:block;font-size:11px;color:var(--ink2);font-family:var(--mono)}

/* Staff chips */
.staffrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.staffchip{padding:9px 15px;border:1.5px solid var(--line);border-radius:99px;font-size:13.5px;font-weight:600;cursor:pointer;background:var(--card)}
.staffchip.sel{border-color:var(--teal);background:var(--teal);color:#fff}

/* Calendario de fechas (scroll horizontal) */
.dates{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
.datebtn{flex:none;width:62px;padding:10px 0;border:1.5px solid var(--line);border-radius:14px;text-align:center;cursor:pointer;background:var(--card)}
.datebtn.sel{border-color:var(--teal);background:var(--teal);color:#fff}
.datebtn .dow{font-size:11px;font-family:var(--mono);text-transform:uppercase;opacity:.8}
.datebtn .dnum{font-family:var(--display);font-weight:800;font-size:19px;margin-top:2px}
.datebtn .mon{font-size:10px;opacity:.7}

/* Horas */
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px;margin-top:4px}
.slot{padding:11px 0;border:1.5px solid var(--line);border-radius:12px;text-align:center;font-family:var(--mono);font-weight:700;font-size:13px;cursor:pointer;background:var(--card)}
.slot:hover{border-color:var(--teal)}
.slot.sel{border-color:var(--teal);background:var(--teal);color:#fff}
.slots-empty{text-align:center;color:var(--ink2);font-size:13.5px;padding:24px;background:var(--card);border:1px dashed var(--line);border-radius:14px;line-height:1.6}

/* Formulario */
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;background:var(--card)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--teal)}

/* Resumen */
.summary{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}
.summary .row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0}
.summary .row.tot{border-top:1px solid var(--line);margin-top:6px;padding-top:12px;font-weight:700}
.summary .row span:first-child{color:var(--ink2)}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-weight:700;font-size:16px;padding:15px;border-radius:14px;cursor:pointer}
.btn-teal{background:var(--teal);color:#fff}
.btn-dark{background:var(--ink);color:#FFF8EC}
.btn-ghost{background:var(--card);border:1.5px solid var(--line);font-size:14px;padding:12px}
.btn:disabled{opacity:.55;cursor:not-allowed}
.alert{display:none;font-size:13px;font-weight:600;padding:12px 14px;border-radius:12px;margin-bottom:14px;line-height:1.5}
.alert.err{display:block;background:#FCE8E6;color:#A1281C;border:1px solid #F3C0BA}

.view{display:none}.view.on{display:block}
.backbtn{font-size:13px;color:var(--ink2);font-weight:600;margin-bottom:4px;display:inline-flex;align-items:center;gap:5px;cursor:pointer}

/* Éxito */
.success{text-align:center;padding:30px 10px}
.success .check{width:72px;height:72px;border-radius:50%;background:var(--teal-soft);display:grid;place-items:center;margin:0 auto 18px}
.success .check svg{width:38px;height:38px;stroke:var(--teal);stroke-width:2.5;fill:none}
.success h2{font-family:var(--display);font-weight:800;font-size:24px;margin-bottom:8px}
.success p{font-size:14px;color:var(--ink2);line-height:1.6;margin-bottom:6px}
.success .code{font-family:var(--mono);font-weight:700;font-size:20px;color:var(--teal-ink);background:var(--teal-soft);display:inline-block;padding:8px 18px;border-radius:12px;margin:12px 0;letter-spacing:.1em}
.foot{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding:30px 0 40px}
</style>
</head>
<body>

<div class="topbar">Reservas por <b>Turnify</b></div>
<div id="boot" class="bootload">Cargando…</div>

<div id="page" style="display:none">
  <div class="cover" id="cover"></div>
  <div class="wrap">
    <div class="bizhead">
      <div class="logo-circle" id="bizLogo"></div>
      <h1 id="bizName"></h1>
      <div class="meta" id="bizMeta"></div>
      <div class="rating" id="bizRating" style="display:none"></div>
    </div>

    <div class="steps">
      <div class="step-dot on" data-s="1"></div>
      <div class="step-dot" data-s="2"></div>
      <div class="step-dot" data-s="3"></div>
    </div>

    <!-- PASO 1: elegir servicio -->
    <section class="view on" id="step1">
      <div class="seclabel">¿Qué servicio quieres?</div>
      <div id="svcList"></div>
    </section>

    <!-- PASO 2: elegir profesional, fecha y hora -->
    <section class="view" id="step2">
      <span class="backbtn" id="back2">← Cambiar servicio</span>
      <div class="seclabel">Elige profesional</div>
      <div class="staffrow" id="staffRow"></div>
      <div class="seclabel">Elige el día</div>
      <div class="dates" id="dateRow"></div>
      <div class="seclabel">Elige la hora</div>
      <div id="slotsArea"></div>
    </section>

    <!-- PASO 3: datos y confirmar -->
    <section class="view" id="step3">
      <span class="backbtn" id="back3">← Cambiar hora</span>
      <div class="seclabel">Confirma tu reserva</div>
      <div class="summary" id="summary"></div>
      <div class="alert" id="formAlert"></div>
      <div class="field"><label>Tu nombre *</label><input id="cName" placeholder="Tu nombre completo"></div>
      <div class="field"><label>WhatsApp * (para el recordatorio)</label><input id="cPhone" type="tel" placeholder="787-555-1234"></div>
      <div class="field"><label>Email (opcional)</label><input id="cEmail" type="email" placeholder="tu@correo.com"></div>
      <div class="field"><label>Nota (opcional)</label><textarea id="cNotes" rows="2" placeholder="Algo que el negocio deba saber"></textarea></div>
      <button class="btn btn-teal" id="confirmBtn">Confirmar reserva →</button>
    </section>

    <!-- ÉXITO -->
    <section class="view" id="stepOk">
      <div class="success">
        <div class="check"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h2>¡Reserva confirmada!</h2>
        <p id="okDetail"></p>
        <div class="code" id="okCode"></div>
        <p style="font-size:13px">Guarda este código. Recibirás un recordatorio por WhatsApp.</p>
      </div>
    </section>

  </div>
</div>

<div class="foot">Hecho con Turnify · turnifypr.com</div>

<script src="turnify-banners.js"></script>
<script>
const API = '/api';

// El slug viene de la URL: turnifypr.com/barberia-x  → o  ?slug=barberia-x
function getSlug(){
  const params = new URLSearchParams(location.search);
  if(params.get('slug')) return params.get('slug');
  // si la URL es /algo, tomar el último segmento
  const parts = location.pathname.split('/').filter(Boolean);
  const last = parts[parts.length-1];
  if(last && !last.includes('.html')) return last;
  return null;
}
const SLUG = getSlug();

const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MON = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

const state = { biz:null, services:[], staff:[], service:null, staffId:null, date:null, slot:null };

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function money(c){ return '$'+((c||0)/100).toFixed(2); }
function showAlert(id,msg){ const e=document.getElementById(id); if(e){e.textContent=msg; e.className='alert err';} }
function clearAlert(id){ const e=document.getElementById(id); if(e){e.className='alert';} }

function goStep(n){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.step-dot').forEach(d=>d.classList.toggle('on', parseInt(d.dataset.s)<=n));
  if(n===1) document.getElementById('step1').classList.add('on');
  if(n===2) document.getElementById('step2').classList.add('on');
  if(n===3) document.getElementById('step3').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

async function boot(){
  if(!SLUG){ document.getElementById('boot').textContent='Enlace inválido. Falta el nombre del negocio.'; return; }
  try{
    const r = await fetch(API+'/public/'+encodeURIComponent(SLUG));
    if(r.status===404){ document.getElementById('boot').textContent='Negocio no encontrado.'; return; }
    if(!r.ok){ document.getElementById('boot').textContent='No se pudo cargar. Intenta de nuevo.'; return; }
    const data = await r.json();
    state.biz = data.business;
    state.services = data.services||[];
    state.staff = data.staff||[];
    renderBiz();
    renderServices();
    document.getElementById('boot').style.display='none';
    document.getElementById('page').style.display='block';
  }catch(e){
    document.getElementById('boot').textContent='Error de conexión.';
  }
}

function renderBiz(){
  const b = state.biz;
  document.getElementById('bizName').textContent = b.name;
  const meta = [];
  if(b.municipality) meta.push(b.municipality);
  if(b.address_line) meta.push(b.address_line);
  document.getElementById('bizMeta').textContent = meta.join(' · ');
  // banner / cover (imagen propia Pro, o patrón predefinido)
  if(window.TurnifyBanners){
    TurnifyBanners.apply(document.getElementById('cover'), b.theme, b.cover_url || null, null);
  }
  // logo
  const logo = document.getElementById('bizLogo');
  if(b.logo_url){ logo.innerHTML = '<img src="'+esc(b.logo_url)+'" alt="">'; }
  else { logo.textContent = (b.name||'?').charAt(0).toUpperCase(); }
  // rating
  if(b.rating_count>0){
    const el = document.getElementById('bizRating');
    el.style.display='inline-flex';
    el.innerHTML = '★ '+Number(b.rating_avg).toFixed(1)+' ('+b.rating_count+')';
  }
}

function renderServices(){
  const list = document.getElementById('svcList');
  if(state.services.length===0){
    list.innerHTML = '<div class="slots-empty">Este negocio aún no ha publicado servicios.</div>';
    return;
  }
  list.innerHTML = state.services.map(s=>{
    const dep = s.deposit_cents>0 ? '<span>+ '+money(s.deposit_cents)+' depósito</span>' : '';
    return '<div class="svc" data-id="'+esc(s.id)+'"><div class="grow"><h4>'+esc(s.name)+'</h4><p>'+s.duration_min+' min'+(s.description?(' · '+esc(s.description)):'')+'</p></div><div class="price"><b>'+money(s.price_cents)+'</b>'+dep+'</div></div>';
  }).join('');
  list.querySelectorAll('.svc').forEach(el=>{
    el.onclick = ()=>{
      state.service = state.services.find(x=>x.id===el.dataset.id);
      renderStaff();
      renderDates();
      state.staffId = null; state.date = null; state.slot = null;
      goStep(2);
    };
  });
}

function renderStaff(){
  const row = document.getElementById('staffRow');
  // opción "cualquiera" + cada profesional
  let html = '<div class="staffchip sel" data-id="">Cualquiera</div>';
  html += state.staff.map(s=>'<div class="staffchip" data-id="'+esc(s.id)+'">'+esc(s.display_name)+'</div>').join('');
  row.innerHTML = html;
  row.querySelectorAll('.staffchip').forEach(chip=>{
    chip.onclick = ()=>{
      row.querySelectorAll('.staffchip').forEach(c=>c.classList.remove('sel'));
      chip.classList.add('sel');
      state.staffId = chip.dataset.id || null;
      state.slot = null;
      if(state.date) loadSlots();
    };
  });
}

function renderDates(){
  const row = document.getElementById('dateRow');
  const horizon = state.biz.booking_horizon_days || 30;
  const days = Math.min(horizon, 21); // mostrar hasta 21 días
  let html = '';
  const today = new Date();
  for(let i=0;i<days;i++){
    const d = new Date(today.getTime() + i*864e5);
    const iso = d.toLocaleDateString('en-CA',{timeZone:'America/Puerto_Rico'});
    html += '<div class="datebtn" data-date="'+iso+'"><div class="dow">'+(i===0?'Hoy':DOW[d.getDay()])+'</div><div class="dnum">'+d.getDate()+'</div><div class="mon">'+MON[d.getMonth()]+'</div></div>';
  }
  row.innerHTML = html;
  row.querySelectorAll('.datebtn').forEach(btn=>{
    btn.onclick = ()=>{
      row.querySelectorAll('.datebtn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      state.date = btn.dataset.date;
      state.slot = null;
      loadSlots();
    };
  });
  // limpiar área de slots
  document.getElementById('slotsArea').innerHTML = '<div class="slots-empty">Elige un día para ver las horas disponibles.</div>';
}

async function loadSlots(){
  const area = document.getElementById('slotsArea');
  area.innerHTML = '<div class="slots-empty">Buscando horas disponibles…</div>';
  try{
    let url = API+'/public/'+encodeURIComponent(SLUG)+'/availability?service_id='+encodeURIComponent(state.service.id)+'&date='+state.date;
    if(state.staffId) url += '&staff_id='+encodeURIComponent(state.staffId);
    const r = await fetch(url);
    const data = await r.json();
    const slots = data.slots||[];
    if(slots.length===0){
      area.innerHTML = '<div class="slots-empty">No hay horas disponibles ese día.<br>Prueba con otra fecha.</div>';
      return;
    }
    area.innerHTML = '<div class="slots">'+slots.map(s=>{
      // s viene como ISO o "HH:MM" — mostramos hora local
      const t = s.includes('T') ? new Date(s).toLocaleTimeString('es-PR',{hour:'numeric',minute:'2-digit'}) : s;
      return '<div class="slot" data-iso="'+esc(s)+'">'+t+'</div>';
    }).join('')+'</div>';
    area.querySelectorAll('.slot').forEach(sl=>{
      sl.onclick = ()=>{
        state.slot = sl.dataset.iso;
        goToConfirm();
      };
    });
  }catch(e){
    area.innerHTML = '<div class="slots-empty">No se pudieron cargar las horas. Intenta de nuevo.</div>';
  }
}

function goToConfirm(){
  const s = state.service;
  // construir el ISO completo de inicio
  let startIso = state.slot;
  if(!startIso.includes('T')){
    // si vino como "HH:MM", combinar con la fecha
    startIso = state.date+'T'+state.slot+':00';
  }
  state.startIso = startIso;
  const when = new Date(startIso);
  const fecha = when.toLocaleDateString('es-PR',{weekday:'long',day:'numeric',month:'long'});
  const hora = when.toLocaleTimeString('es-PR',{hour:'numeric',minute:'2-digit'});
  const staffName = state.staffId ? (state.staff.find(x=>x.id===state.staffId)||{}).display_name : 'Cualquiera disponible';
  document.getElementById('summary').innerHTML =
    '<div class="row"><span>Servicio</span><b>'+esc(s.name)+'</b></div>'+
    '<div class="row"><span>Profesional</span><b>'+esc(staffName)+'</b></div>'+
    '<div class="row"><span>Fecha</span><b>'+fecha+'</b></div>'+
    '<div class="row"><span>Hora</span><b>'+hora+'</b></div>'+
    '<div class="row"><span>Duración</span><b>'+s.duration_min+' min</b></div>'+
    '<div class="row tot"><span>Total</span><b>'+money(s.price_cents)+'</b></div>';
  goStep(3);
}

document.getElementById('back2').onclick = ()=>goStep(1);
document.getElementById('back3').onclick = ()=>goStep(2);

document.getElementById('confirmBtn').onclick = async ()=>{
  clearAlert('formAlert');
  const full_name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  const email = document.getElementById('cEmail').value.trim();
  const notes = document.getElementById('cNotes').value.trim();
  if(!full_name){ showAlert('formAlert','Escribe tu nombre.'); return; }
  if(phone.replace(/\D/g,'').length < 10){ showAlert('formAlert','Escribe un WhatsApp válido (10 dígitos).'); return; }

  const body = {
    service_id: state.service.id,
    start_iso: state.startIso,
    full_name, phone,
  };
  if(state.staffId) body.staff_id = state.staffId;
  if(email) body.email = email;
  if(notes) body.client_notes = notes;

  const btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = 'Reservando…';
  try{
    const r = await fetch(API+'/public/'+encodeURIComponent(SLUG)+'/appointments',{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    const data = await r.json();
    if(!r.ok){
      showAlert('formAlert', data.error || 'No se pudo reservar. Intenta de nuevo.');
      btn.disabled=false; btn.textContent='Confirmar reserva →';
      return;
    }
    // éxito
    const appt = data.appointment || data;
    const when = new Date(state.startIso);
    document.getElementById('okDetail').textContent =
      state.service.name+' · '+when.toLocaleDateString('es-PR',{weekday:'long',day:'numeric',month:'long'})+' a las '+when.toLocaleTimeString('es-PR',{hour:'numeric',minute:'2-digit'});
    document.getElementById('okCode').textContent = appt.confirmation_code || '—';
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
    document.getElementById('stepOk').classList.add('on');
    document.querySelectorAll('.step-dot').forEach(d=>d.classList.add('on'));
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){
    showAlert('formAlert','Error de conexión. Intenta de nuevo.');
    btn.disabled=false; btn.textContent='Confirmar reserva →';
  }
};

boot();
</script>
</body>
</html>

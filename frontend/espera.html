<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de espera — Bukéame</title>
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Gestiona la lista de espera de tu negocio en Bukéame: revisa quién espera un espacio y avísales por WhatsApp cuando se abra un turno disponible.">
<meta name="theme-color" content="#0E8074">
<link rel="canonical" href="https://bukeame.com/espera.html">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230E8074'/%3E%3Ctext x='16' y='23' font-family='Arial,sans-serif' font-size='20' font-weight='700' fill='%23fff' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#F1EFE5;--bg2:#F7F4EA;--card:#FFFFFF;--card-soft:#EDE9DB;--border:#E1DCCD;
--text:#17150F;--muted:#5E594B;--muted2:#B3AD9C;--green:#0E8074;--green-ink:#FFFFFF;
--green-soft:#E3EFE9;--green-glow:rgba(14,128,116,.45);
--awning:repeating-linear-gradient(90deg,#0E8074 0 26px,#0A5B52 26px 28px,#F8F5EA 28px 54px,#E7E2D1 54px 56px);
--display:"Bricolage Grotesque",sans-serif;--body:"Instrument Sans",sans-serif;--mono:"Spline Sans Mono",monospace;
--paper:var(--bg);--ink:var(--text);--ink2:var(--muted);--teal:var(--green);--teal-ink:var(--green);--teal-soft:var(--green-soft);--line:var(--border);--mango:#EFA12F}
html[data-theme="dark"]{
--bg:#0B1A13;--bg2:#0E2218;--card:#12251B;--card-soft:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);
--text:#ECEAE0;--muted:#8AA197;--muted2:#5d6f66;--green:#36E27B;--green-ink:#08160F;
--green-soft:rgba(54,226,123,.12);--green-glow:rgba(54,226,123,.3);
--awning:repeating-linear-gradient(90deg,#36E27B 0 26px,#0d6b46 26px 28px,#0E2218 28px 54px,#10241A 54px 56px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
.bootload{min-height:100vh;display:grid;place-items:center;color:var(--muted);font-size:14px}
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.nav a.back{font-size:18px}.nav .logo{font-family:var(--display);font-weight:800;font-size:19px}.nav .logo i{font-style:normal;color:var(--green)}
.nav .spacer{flex:1}
.theme-tg{display:inline-flex;gap:2px;background:var(--card-soft);border:1px solid var(--border);border-radius:999px;padding:3px}
.theme-tg button{font:700 11.5px 'Instrument Sans',sans-serif;padding:6px 12px;border-radius:999px;line-height:1;cursor:pointer;border:0;background:transparent;color:var(--muted)}
.theme-tg button.on{background:var(--green);color:var(--green-ink)}
.wrap{max-width:600px;margin:0 auto;padding:24px 16px 60px}
h1{font-family:var(--display);font-weight:800;font-size:27px;letter-spacing:-.025em;margin-bottom:5px}
.sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.wl{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:border-color .15s,box-shadow .15s}
.wl:hover{border-color:var(--green);box-shadow:0 4px 14px var(--green-glow)}
.wl .pos{width:30px;height:30px;border-radius:50%;background:var(--green-soft);color:var(--green);font-weight:800;font-family:var(--display);display:grid;place-items:center;flex:none}
.wl .grow{flex:1;min-width:0}
.wl h4{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.wl p{font-size:12.5px;color:var(--muted);margin-top:3px}
.wl .offered{font-size:10px;font-weight:700;background:#FBEFD8;color:#8a5a13;padding:2px 8px;border-radius:99px;font-family:var(--mono);letter-spacing:.02em}
html[data-theme="dark"] .wl .offered{background:rgba(239,161,47,.18);color:#EFB85C}
.wl .del{color:#C0392B;font-size:12px;font-weight:600;flex:none;padding:6px 10px;border-radius:9px;transition:background .15s}
.wl .del:hover{background:rgba(192,57,43,.1)}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:44px 24px;line-height:1.6;background:var(--card);border:1.5px dashed var(--border);border-radius:18px}
.locked{text-align:center;padding:40px 26px;background:linear-gradient(135deg,var(--bg2),var(--green));color:var(--green-ink);border-radius:22px;box-shadow:0 12px 36px var(--green-glow)}
.locked .ic{font-size:42px;margin-bottom:14px}
.locked h2{font-family:var(--display);font-weight:800;font-size:23px;letter-spacing:-.02em;margin-bottom:8px}
.locked p{font-size:14px;opacity:.92;line-height:1.55;margin-bottom:20px}
.locked a{display:inline-block;background:var(--card);color:var(--green);font-weight:700;font-size:14px;padding:13px 24px;border-radius:14px;box-shadow:0 4px 14px rgba(0,0,0,.18)}
.info{background:var(--green-soft);border:1px solid var(--border);border-radius:16px;padding:15px 17px;font-size:13px;color:var(--green);line-height:1.5;margin-bottom:20px}
.foot{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:20px 0 40px}
</style>
</head>
<body>
<script>
(function(){var t=localStorage.getItem('bukeame_theme')||'dark';document.documentElement.setAttribute('data-theme',t);
window.__setTheme=function(t){localStorage.setItem('bukeame_theme',t);document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-tg button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-theme-set')===t);});};
document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('[data-theme-set]').forEach(function(b){b.addEventListener('click',function(){window.__setTheme(b.getAttribute('data-theme-set'));});});window.__setTheme(localStorage.getItem('bukeame_theme')||'dark');});})();
</script>
<div id="boot" class="bootload">Cargando…</div>
<div id="app" style="display:none">
<nav class="nav"><a href="panel.html" class="back">←</a><span class="logo">Buk<i>é</i>ame</span><span class="spacer"></span><div class="theme-tg"><button type="button" data-theme-set="light">Claro</button><button type="button" data-theme-set="dark">Oscuro</button></div></nav>
<div style="height:12px;background:var(--awning)"></div>
<div class="wrap">
  <h1>Lista de espera</h1>
  <p class="sub">Clientes esperando un espacio.</p>
  <div id="content"></div>
</div>
</div>
<div class="foot">Hecho con Bukéame · bukeame.com</div>

<script>
const API='/api';
const token=localStorage.getItem('bukeame_token');
if(!token){ location.href='acceso.html'; }
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
async function api(method,path,body){
  const opts={method,headers:{'Authorization':'Bearer '+token}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  const r=await fetch(API+path,opts);
  if(r.status===401){localStorage.clear();location.href='acceso.html';throw new Error('s');}
  let data={};try{data=await r.json();}catch(e){}
  return {status:r.status,ok:r.ok,data};
}

async function load(){
  const r=await api('GET','/waitlist');
  document.getElementById('boot').style.display='none';
  document.getElementById('app').style.display='block';
  const content=document.getElementById('content');
  // si el plan no incluye lista de espera, da 403
  if(r.status===403){
    content.innerHTML='<div class="locked"><div class="ic">⏳</div><h2>Lista de espera</h2><p>Cuando se llena tu agenda, los clientes pueden anotarse en lista de espera y les avisas si se abre un espacio. Disponible en el plan Studio.</p><a href="panel.html">Ver planes</a></div>';
    return;
  }
  const list=(r.ok&&r.data.waitlist)?r.data.waitlist:(r.ok&&Array.isArray(r.data)?r.data:[]);
  content.innerHTML='<div class="info">💡 Cuando se abra un espacio, podrás ofrecerlo a quien esté en la lista. Recibirán un aviso por WhatsApp.</div>';
  if(list.length===0){
    content.innerHTML+='<div class="empty">No hay nadie en lista de espera.<br>Cuando tu agenda se llene, los clientes podrán anotarse.</div>';
    return;
  }
  content.innerHTML+=list.map(function(w,i){
    const offered=w.offer_state&&w.offer_state!=='none'?'<span class="offered">Ofrecido</span>':'';
    return '<div class="wl"><div class="pos">'+(w.position||i+1)+'</div><div class="grow"><h4>'+esc(w.full_name||'Cliente')+' '+offered+'</h4><p>'+(w.service_name?esc(w.service_name):'Cualquier servicio')+(w.staff_name?(' · '+esc(w.staff_name)):'')+'</p></div><button class="del" data-id="'+esc(w.id)+'">Quitar</button></div>';
  }).join('');
  content.querySelectorAll('.del').forEach(function(b){
    b.onclick=async function(){ if(!confirm('¿Quitar de la lista?'))return; const r=await api('DELETE','/waitlist/'+b.dataset.id); if(r.ok)load(); };
  });
}
load();
</script>
</body>
</html>

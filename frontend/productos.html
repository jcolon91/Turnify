<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda — Turnify</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F1EFE5;--card:#fff;--ink:#17150F;--ink2:#5E594B;--teal:#0E8074;--teal-ink:#0A5B52;--teal-soft:#E3EFE9;--mango:#EFA12F;--line:#E1DCCD;
--display:"Bricolage Grotesque",sans-serif;--body:"Instrument Sans",sans-serif;--mono:"Spline Sans Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,textarea{font:inherit}
.bootload{min-height:100vh;display:grid;place-items:center;color:var(--ink2);font-size:14px}
.nav{background:var(--card);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.nav a.back{font-size:18px}.nav .logo{font-family:var(--display);font-weight:800;font-size:19px}.nav .logo i{font-style:normal;color:var(--teal)}
.wrap{max-width:600px;margin:0 auto;padding:24px 16px 60px}
.tophead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
h1{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.02em}
.sub{font-size:13px;color:var(--ink2);margin-top:3px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;padding:10px 16px;border-radius:12px;cursor:pointer;background:var(--teal);color:#fff}
.btn:disabled{opacity:.55}
.prod{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px;display:flex;gap:13px;align-items:center;margin-bottom:10px}
.prod .ph{width:60px;height:60px;border-radius:12px;background:var(--teal-soft);flex:none;display:grid;place-items:center;font-size:24px;overflow:hidden}
.prod .ph img{width:100%;height:100%;object-fit:cover}
.prod .grow{flex:1;min-width:0}
.prod h4{font-size:15px;font-weight:700}
.prod p{font-size:12.5px;color:var(--ink2);margin-top:2px}
.prod .price{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--teal-ink)}
.prod .del{color:#A1281C;font-size:12px;font-weight:600}
.empty{text-align:center;color:var(--ink2);font-size:14px;padding:40px 20px;line-height:1.6;background:var(--card);border:1px dashed var(--line);border-radius:16px}
.locked{text-align:center;padding:36px 24px;background:linear-gradient(135deg,#11221E,#0A5B52);color:#FFF8EC;border-radius:20px}
.locked .ic{font-size:40px;margin-bottom:12px}
.locked h2{font-family:var(--display);font-weight:800;font-size:22px;margin-bottom:8px}
.locked p{font-size:14px;opacity:.9;line-height:1.55;margin-bottom:18px}
.locked a{display:inline-block;background:#FFF8EC;color:var(--teal-ink);font-weight:700;font-size:14px;padding:12px 22px;border-radius:12px}
.modal{display:none;position:fixed;inset:0;background:rgba(20,18,12,.5);z-index:100;align-items:center;justify-content:center;padding:18px}
.modal.on{display:flex}
.modal .box{background:var(--card);border-radius:18px;padding:22px;max-width:420px;width:100%}
.modal h3{font-family:var(--display);font-weight:800;font-size:19px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;background:#FCFBF7}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--teal)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-ghost{background:var(--card);border:1.5px solid var(--line);color:var(--ink)}
.alert{display:none;font-size:13px;font-weight:600;padding:11px 13px;border-radius:11px;margin-bottom:12px}
.alert.err{display:block;background:#FCE8E6;color:#A1281C;border:1px solid #F3C0BA}
.foot{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding:20px 0 40px}
</style>
</head>
<body>
<div id="boot" class="bootload">Cargando…</div>
<div id="app" style="display:none">
<nav class="nav"><a href="panel.html" class="back">←</a><span class="logo">Turn<i>i</i>fy</span></nav>
<div class="wrap">
  <div class="tophead">
    <div><h1>Tienda</h1><p class="sub" id="sub">Vende productos a tus clientes.</p></div>
    <button class="btn" id="addBtn" style="display:none">+ Producto</button>
  </div>
  <div id="content"></div>
</div>
</div>
<div class="foot">Hecho con Turnify · turnifypr.com</div>

<div class="modal" id="modal">
  <div class="box">
    <h3>Nuevo producto</h3>
    <div class="alert" id="mAlert"></div>
    <div class="field"><label>Nombre *</label><input id="pName" placeholder="Pomada para cabello"></div>
    <div class="row2">
      <div class="field"><label>Precio ($) *</label><input id="pPrice" type="number" value="10" min="0" step="0.01"></div>
      <div class="field"><label>Inventario</label><input id="pStock" type="number" value="0" min="0"></div>
    </div>
    <div class="field"><label>Descripción (opcional)</label><textarea id="pDesc" rows="2"></textarea></div>
    <div style="display:flex;gap:10px"><button class="btn btn-ghost" id="mCancel" style="flex:1">Cancelar</button><button class="btn" id="mSave" style="flex:1">Guardar</button></div>
  </div>
</div>

<script>
const API='/api';
const token=localStorage.getItem('turnify_token');
if(!token){ location.href='acceso.html'; }
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function money(c){return '$'+((c||0)/100).toFixed(2);}
async function api(method,path,body){
  const opts={method,headers:{'Authorization':'Bearer '+token}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  const r=await fetch(API+path,opts);
  if(r.status===401){localStorage.clear();location.href='acceso.html';throw new Error('s');}
  let data={};try{data=await r.json();}catch(e){}
  return {status:r.status,ok:r.ok,data};
}

async function load(){
  const r=await api('GET','/products');
  document.getElementById('boot').style.display='none';
  document.getElementById('app').style.display='block';
  const content=document.getElementById('content');
  // si el plan no tiene tienda, limit será 0
  if(r.ok && r.data.limit===0){
    content.innerHTML='<div class="locked"><div class="ic">🛍️</div><h2>Activa tu tienda</h2><p>Vende productos directo a tus clientes. Disponible con el add-on de Tienda.</p><a href="panel.html">Ver planes</a></div>';
    return;
  }
  document.getElementById('addBtn').style.display='inline-flex';
  const prods=(r.ok&&r.data.products)?r.data.products:[];
  if(r.data.limit) document.getElementById('sub').textContent='Vende productos a tus clientes. ('+(r.data.used||0)+'/'+r.data.limit+')';
  if(prods.length===0){
    content.innerHTML='<div class="empty">Aún no tienes productos.<br>Toca "+ Producto" para añadir el primero.</div>';
    return;
  }
  content.innerHTML=prods.map(function(p){
    const photo=(p.photos&&p.photos[0])?'<img src="'+esc(p.photos[0].url)+'">':'📦';
    return '<div class="prod"><div class="ph">'+photo+'</div><div class="grow"><h4>'+esc(p.name)+'</h4><p>'+(p.stock!=null?p.stock+' en inventario':'')+(p.description?(' · '+esc(p.description)):'')+'</p></div><div style="text-align:right"><div class="price">'+money(p.price_cents)+'</div><button class="del" data-id="'+esc(p.id)+'">Borrar</button></div></div>';
  }).join('');
  content.querySelectorAll('.del').forEach(function(b){
    b.onclick=async function(){ if(!confirm('¿Borrar este producto?'))return; const r=await api('DELETE','/products/'+b.dataset.id); if(r.ok)load(); };
  });
}

const modal=document.getElementById('modal');
document.getElementById('addBtn').onclick=function(){ document.getElementById('mAlert').className='alert'; modal.classList.add('on'); };
document.getElementById('mCancel').onclick=function(){ modal.classList.remove('on'); };
document.getElementById('mSave').onclick=async function(){
  const name=document.getElementById('pName').value.trim();
  const price=Math.round(parseFloat(document.getElementById('pPrice').value)*100);
  const stock=parseInt(document.getElementById('pStock').value,10)||0;
  const desc=document.getElementById('pDesc').value.trim();
  const a=document.getElementById('mAlert');
  if(!name){a.textContent='Escribe el nombre.';a.className='alert err';return;}
  if(!(price>=0)){a.textContent='Precio inválido.';a.className='alert err';return;}
  const btn=this;btn.disabled=true;btn.textContent='…';
  const r=await api('POST','/products',{name,price_cents:price,stock,description:desc||undefined});
  btn.disabled=false;btn.textContent='Guardar';
  if(r.ok){modal.classList.remove('on');document.getElementById('pName').value='';document.getElementById('pDesc').value='';load();}
  else{a.textContent=r.data.error||'No se pudo guardar.';a.className='alert err';}
};

load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Bukéame</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F1EFE5;--card:#fff;--ink:#17150F;--ink2:#5E594B;--teal:#0E8074;--teal-ink:#0A5B52;--teal-soft:#E3EFE9;--line:#E1DCCD;
--display:"Bricolage Grotesque",sans-serif;--body:"Instrument Sans",sans-serif;--mono:"Spline Sans Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}button{font:inherit;cursor:pointer;border:0}
.demobar{background:var(--ink);color:#CFC9B6;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;display:flex;gap:14px;overflow-x:auto;white-space:nowrap}
.demobar a{color:#CFC9B6}.demobar a.on{color:#9FE8D5}
.awning{height:12px;background:repeating-linear-gradient(90deg,var(--teal) 0 26px,#0A5B52 26px 28px,#F8F5EA 28px 54px,#E7E2D1 54px 56px)}
.stage{flex:1;display:grid;place-items:center;padding:30px 16px 50px}
.box{width:100%;max-width:420px}
.logo{font-family:var(--display);font-weight:800;font-size:28px;text-align:center;letter-spacing:-.02em;margin-bottom:4px}
.logo i{font-style:normal;color:var(--teal)}
.tag{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);text-align:center;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 22px 44px -24px rgba(23,21,15,.25)}
.tabs{display:flex;background:#E8E4D6;border:1px solid var(--line);border-radius:99px;padding:3px;margin-bottom:20px}
.tabs button{flex:1;font-weight:700;font-size:13.5px;padding:10px;border-radius:99px;background:none;color:var(--ink2)}
.tabs button.on{background:var(--ink);color:#FFF8EC}
.pane{display:none}.pane.on{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.field input{width:100%;font:inherit;font-size:15px;padding:13px 14px;border-radius:13px;border:1.5px solid var(--line);background:#FDFCF8;color:var(--ink)}
.field input:focus{outline:none;border-color:var(--teal)}
.cta{width:100%;background:var(--teal);color:#fff;font-weight:800;font-size:15px;padding:15px;border-radius:14px;margin-top:6px}
.alt{width:100%;background:var(--card);border:1.5px solid var(--line);font-weight:700;font-size:13.5px;padding:13px;border-radius:13px;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:9px}
.terms{display:flex;gap:9px;font-size:11.5px;color:var(--ink2);line-height:1.5;margin:14px 0 4px;align-items:flex-start}
.terms input{margin-top:2px;accent-color:var(--teal)}
.terms a{color:var(--teal-ink);font-weight:700}
.refbox{background:var(--teal-soft);border-radius:13px;padding:11px 13px;font-size:12px;color:var(--teal-ink);margin-bottom:12px;line-height:1.5}
.refbox b{font-family:var(--mono)}
.foot{text-align:center;font-size:12px;color:var(--ink2);margin-top:16px;line-height:1.7}
.foot a{color:var(--teal-ink);font-weight:700}
.secline{display:flex;justify-content:center;gap:14px;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-top:18px}

.ic-svg{flex:none}button .ic-svg,a.btn .ic-svg,.field .ic-svg,.pm .ic-svg{margin-right:.4em}.field .ic-svg{margin-right:.55em}
.alert{display:none;font-size:13px;font-weight:600;padding:11px 13px;border-radius:12px;margin-bottom:14px;line-height:1.45}
.alert.err{display:block;background:#FCE8E6;color:#A1281C;border:1px solid #F3C0BA}
.alert.ok{display:block;background:var(--teal-soft);color:var(--teal-ink);border:1px solid #BFE0D5}
.cta:disabled{opacity:.6;cursor:not-allowed}
</style>
</head>
<body>
<div class="awning"></div>

<div class="stage">
  <div class="box">
    <div class="logo">Buk<i>é</i>ame</div>
    <div class="tag">Tu turno, sin llamadas</div>

    <div class="card">
      <div class="tabs">
        <button class="on" data-p="entrar">Entrar</button>
        <button data-p="crear">Crear cuenta</button>
      </div>

      <!-- LOGIN -->
      <div class="pane on" id="entrar">
        <div class="alert" id="loginAlert"></div>
        <div class="field"><label>EMAIL</label><input id="loginEmail" type="email" placeholder="tu@negocio.com" autocomplete="email"></div>
        <div class="field"><label>CONTRASEÑA</label><input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="cta" id="loginBtn">Entrar →</button>
        <div class="foot"><a href="#" id="forgotLink">¿Olvidaste tu contraseña?</a></div>
      </div>

      <!-- REGISTRO -->
      <div class="pane" id="crear">
        <div class="alert" id="regAlert"></div>
        <div class="refbox"><svg class="ic-svg" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.18em;display:inline-block;flex:none"><rect x="3.5" y="9" width="17" height="11.5" rx="1.5"/><path d="M3.5 13h17M12 9v11.5M12 9S10.5 4.5 8 4.5a2.2 2.2 0 0 0 0 4.5M12 9s1.5-4.5 4-4.5a2.2 2.2 0 0 1 0 4.5"/></svg> ¿Te refirió un negocio? Con su código obtienes <b>15 días gratis del plan Pro</b> al registrarte.</div>
        <div class="field"><label>TU NOMBRE</label><input id="regName" placeholder="Jesús Colón" autocomplete="name"></div>
        <div class="field"><label>EMAIL</label><input id="regEmail" type="email" placeholder="tu@negocio.com" autocomplete="email"></div>
        <div class="field"><label>CONTRASEÑA (mín. 8 caracteres)</label><input id="regPass" type="password" placeholder="••••••••" autocomplete="new-password"></div>
        <div class="field"><label>CÓDIGO DE REFERIDO (opcional)</label><input id="regRef" placeholder="CARLOS1" style="font-family:var(--mono);text-transform:uppercase"></div>
        <label class="terms"><input type="checkbox" id="regTerms"> Acepto los <a href="terminos.html" target="_blank">Términos y Condiciones</a> y la <a href="privacidad.html" target="_blank">Política de Privacidad</a>.</label>
        <button class="cta" id="regBtn">Crear mi cuenta gratis →</button>
      </div>
    </div>

    <div class="secline"><span><svg class="ic-svg" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.18em;display:inline-block;flex:none"><rect x="4.5" y="10.5" width="15" height="10" rx="2"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/></svg> Cifrado TLS</span><span>2FA disponible</span><span>Sesiones de 30 días</span></div>
  </div>
</div>

<script>
// ── Tabs (entrar / crear cuenta) ──────────────────────────────────────────
document.querySelectorAll('.tabs button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
    document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id===b.dataset.p));
  };
});

// ── Conexión con el API ───────────────────────────────────────────────────
const API = '/api';

function showAlert(id, msg, ok){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + (ok ? 'ok' : 'err');
}

async function apiPost(path, body){
  const r = await fetch(API + path, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  let data = {};
  try { data = await r.json(); } catch(e){}
  if(!r.ok) throw new Error(data.error || 'Algo salió mal. Intenta de nuevo.');
  return data;
}

// Guarda la sesión y redirige según si es admin o dueño de negocio
function saveSessionAndGo(data){
  localStorage.setItem('bukeame_token', data.access_token);
  localStorage.setItem('bukeame_refresh', data.refresh_token);
  localStorage.setItem('bukeame_user', JSON.stringify(data.user));
  if(data.user && data.user.is_platform_admin){
    location.href = 'admin.html';
  } else {
    location.href = 'panel.html';
  }
}

// ── LOGIN ─────────────────────────────────────────────────────────────────
const loginBtn = document.getElementById('loginBtn');
loginBtn.onclick = async ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if(!email || !pass){ showAlert('loginAlert','Escribe tu email y contraseña.',false); return; }
  loginBtn.disabled = true; loginBtn.textContent = 'Entrando…';
  try{
    const data = await apiPost('/auth/login', { email, password: pass });
    showAlert('loginAlert','¡Bienvenido! Entrando…', true);
    saveSessionAndGo(data);
  }catch(err){
    showAlert('loginAlert', err.message, false);
    loginBtn.disabled = false; loginBtn.textContent = 'Entrar →';
  }
};

// ── REGISTRO ──────────────────────────────────────────────────────────────
const regBtn = document.getElementById('regBtn');
regBtn.onclick = async ()=>{
  const full_name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const ref   = document.getElementById('regRef').value.trim();
  const terms = document.getElementById('regTerms').checked;

  if(!full_name){ showAlert('regAlert','Escribe tu nombre.',false); return; }
  if(!email){ showAlert('regAlert','Escribe tu email.',false); return; }
  if(pass.length < 8){ showAlert('regAlert','La contraseña debe tener al menos 8 caracteres.',false); return; }
  if(!terms){ showAlert('regAlert','Debes aceptar los términos y la política de privacidad.',false); return; }

  regBtn.disabled = true; regBtn.textContent = 'Creando…';
  try{
    const body = { full_name, email, password: pass };
    if(ref) body.referral_code = ref.toUpperCase();
    const data = await apiPost('/auth/register', body);
    showAlert('regAlert','¡Cuenta creada! Entrando…', true);
    saveSessionAndGo(data);
  }catch(err){
    showAlert('regAlert', err.message, false);
    regBtn.disabled = false; regBtn.textContent = 'Crear mi cuenta gratis →';
  }
};

// Permite enviar con Enter
document.getElementById('loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') loginBtn.click(); });
document.getElementById('regPass').addEventListener('keydown',e=>{ if(e.key==='Enter') regBtn.click(); });

// ── Olvidé mi contraseña ──────────────────────────────────────────────────
document.getElementById('forgotLink').addEventListener('click', async (e)=>{
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  if(!email){ showAlert('loginAlert','Escribe tu email arriba y vuelve a tocar el enlace.', false); return; }
  const link = e.target;
  link.textContent = 'Enviando…';
  try {
    const data = await apiPost('/auth/forgot-password', { email });
    showAlert('loginAlert', data.message || 'Si ese email está registrado, te enviamos un enlace.', true);
  } catch(err){
    showAlert('loginAlert', err.message, false);
  } finally {
    link.textContent = '¿Olvidaste tu contraseña?';
  }
});
</script>
</body>
</html>

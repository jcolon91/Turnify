<style>
:root{
--bg:#F1EFE5;--bg2:#F7F4EA;--card:#FFFFFF;--card-soft:#EDE9DB;--border:#E1DCCD;

--display:"Bricolage Grotesque",sans-serif;--body:"Instrument Sans",sans-serif;--mono:"Spline Sans Mono",monospace;
/* mapeo variables viejas → nuevas */
--paper:var(--bg);--ink:var(--text);--ink2:var(--muted);--teal:var(--green);--teal-ink:var(--green);--teal-soft:var(--green-soft);--line:var(--border)}
html[data-theme="dark"]{color-scheme:dark;
--bg:#0B1A13;--bg2:#0E2218;--card:#12251B;--card-soft:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);
--text:#ECEAE0;--muted:#8AA197;--muted2:#5d6f66;--green:#36E27B;--green-ink:#08160F;

--awning:repeating-linear-gradient(90deg,#36E27B 0 26px,#0d6b46 26px 28px,#0E2218 28px 54px,#10241A 54px 56px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}button{font:inherit;cursor:pointer;border:0}
.awning{height:12px;background:var(--awning)}
.theme-tg{display:inline-flex;background:var(--card-soft);border:1px solid var(--border);border-radius:11px;padding:3px}
.theme-tg button{font:700 12.5px 'Instrument Sans',sans-serif;padding:6px 13px;border-radius:8px;cursor:pointer;border:0;background:transparent;color:var(--muted)}

.tag{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);text-align:center;margin-bottom:22px}
.rolerow{display:flex;justify-content:center;margin-bottom:20px}

.rolemin button{font:700 12.5px var(--body);padding:7px 20px;border-radius:99px;background:none;color:var(--muted);transition:background .16s ease,color .16s ease}

.explore a{font-size:12.5px;font-weight:700;color:var(--green);white-space:nowrap}
.ic-svg{flex:none}.field .ic-svg{margin-right:.55em}
.alert{display:none;font-size:13px;font-weight:600;padding:11px 13px;border-radius:12px;margin-bottom:14px;line-height:1.45}
.alert.err{display:block;background:#FCE8E6;color:#A1281C;border:1px solid #F3C0BA}
html[data-theme="dark"] .alert.err{background:rgba(225,75,60,.14);color:#FF9A8E;border-color:rgba(225,75,60,.35)}
.alert.ok{display:block;background:var(--green-soft);color:var(--green);border:1px solid var(--green-glow)}
.cta:disabled{opacity:.6;cursor:not-allowed}
.social{display:none;flex-direction:column;gap:9px;margin-bottom:4px}
.social.on{display:flex}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;font-weight:700;font-size:14.5px;padding:13px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);color:var(--text);transition:border-color .18s ease,background .18s ease}
.social-btn:hover{border-color:var(--green)}
.social-btn:disabled{opacity:.6;cursor:not-allowed}
.social-btn .ic-svg{flex:none}
#googleBtnHost{display:flex;justify-content:center}
#googleBtnHost > div{width:100%!important}
.sep{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted2);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--border)}
</style>

<script>
// ── Selector de ROL (Cliente / Negocio) ───────────────────────────────────
// El rol NO cambia el login/registro; solo cambia a dónde redirigimos después.
// Se persiste en localStorage para recordar la elección entre visitas.
let bukRole = localStorage.getItem('bukeame_role');
if(bukRole !== 'negocio' && bukRole !== 'cliente') bukRole = 'cliente';
function setRole(r){
  bukRole = (r === 'negocio') ? 'negocio' : 'cliente';
  localStorage.setItem('bukeame_role', bukRole);
  document.querySelectorAll('#roleSeg button').forEach(b=>b.classList.toggle('on', b.dataset.role===bukRole));
}
document.querySelectorAll('#roleSeg button').forEach(b=>{ b.onclick=()=>setRole(b.dataset.role); });
setRole(bukRole);

// ── Tabs (entrar / crear cuenta) ──────────────────────────────────────────
document.querySelectorAll('.tabs button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
    document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id===b.dataset.p));
  };
});

// ── Código de referido en la URL (?ref=CODE) → prellena y abre "Crear cuenta"
(function(){
  const ref = new URLSearchParams(location.search).get('ref');
  if(!ref) return;
  const input = document.getElementById('regRef');
  if(input) input.value = ref.trim().toUpperCase();
  // Un código de referido lo trae un negocio → preseleccionamos rol "negocio".
  setRole('negocio');
  const tab = document.querySelector('.tabs button[data-p="crear"]');
  if(tab) tab.click();
})();

// ── Conexión con el API ───────────────────────────────────────────────────
const API = '/api';

function showAlert(id, msg, ok){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + (ok ? 'ok' : 'err');
}

async function apiPost(path, body){
  const r = await fetch(API + path, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  let data = {};
  try { data = await r.json(); } catch(e){}
  if(!r.ok) throw new Error(data.error || 'Algo salió mal. Intenta de nuevo.');
  return data;
}

// Guarda la sesión y redirige según el ROL elegido.
//   • Admin de plataforma → siempre admin.html (manda sobre el rol).
//   • Rol "negocio"       → panel.html (allí crea/gestiona su negocio).
//   • Rol "cliente"       → buscar.html (el buscador de negocios).
function saveSessionAndGo(data){
  localStorage.setItem('bukeame_token', data.access_token);
  localStorage.setItem('bukeame_refresh', data.refresh_token);
  localStorage.setItem('bukeame_user', JSON.stringify(data.user));
  if(data.user && data.user.is_platform_admin){
    location.href = 'admin.html';
  } else if(bukRole === 'negocio'){
    location.href = 'panel.html';
  } else {
    location.href = 'buscar.html';
  }
}

// ── LOGIN ─────────────────────────────────────────────────────────────────
const loginBtn = document.getElementById('loginBtn');
loginBtn.onclick = async ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if(!email || !pass){ showAlert('loginAlert','Escribe tu email y contraseña.',false); return; }
  loginBtn.disabled = true; loginBtn.textContent = 'Entrando…';
  try{
    const data = await apiPost('/auth/login', { email, password: pass });
    showAlert('loginAlert','¡Bienvenido! Entrando…', true);
    saveSessionAndGo(data);
  }catch(err){
    showAlert('loginAlert', err.message, false);
    loginBtn.disabled = false; loginBtn.textContent = 'Entrar →';
  }
};

// ── REGISTRO ──────────────────────────────────────────────────────────────
const regBtn = document.getElementById('regBtn');
regBtn.onclick = async ()=>{
  const full_name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const ref   = document.getElementById('regRef').value.trim();
  const terms = document.getElementById('regTerms').checked;

  if(!full_name){ showAlert('regAlert','Escribe tu nombre.',false); return; }
  if(!email){ showAlert('regAlert','Escribe tu email.',false); return; }
  if(pass.length < 8){ showAlert('regAlert','La contraseña debe tener al menos 8 caracteres.',false); return; }
  if(!terms){ showAlert('regAlert','Debes aceptar los términos y la política de privacidad.',false); return; }

  regBtn.disabled = true; regBtn.textContent = 'Creando…';
  try{
    const body = { full_name, email, password: pass, accept_terms: terms };
    if(ref) body.referral_code = ref.toUpperCase();
    const data = await apiPost('/auth/register', body);
    showAlert('regAlert','¡Cuenta creada! Entrando…', true);
    saveSessionAndGo(data);
  }catch(err){
    showAlert('regAlert', err.message, false);
    regBtn.disabled = false; regBtn.textContent = 'Crear mi cuenta gratis →';
  }
};

// Permite enviar con Enter
document.getElementById('loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') loginBtn.click(); });
document.getElementById('regPass').addEventListener('keydown',e=>{ if(e.key==='Enter') regBtn.click(); });

// ── Olvidé mi contraseña ──────────────────────────────────────────────────
document.getElementById('forgotLink').addEventListener('click', async (e)=>{
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  if(!email){ showAlert('loginAlert','Escribe tu email arriba y vuelve a tocar el enlace.', false); return; }
  const link = e.target;
  link.textContent = 'Enviando…';
  try {
    const data = await apiPost('/auth/forgot-password', { email });
    showAlert('loginAlert', data.message || 'Si ese email está registrado, te enviamos un enlace.', true);
  } catch(err){
    showAlert('loginAlert', err.message, false);
  } finally {
    link.textContent = '¿Olvidaste tu contraseña?';
  }
});

// ── LOGIN SOCIAL (Google / Apple) ─────────────────────────────────────────
// Carga un script externo una sola vez y resuelve cuando está listo.
function loadScript(src){
  return new Promise((resolve, reject)=>{
    if(document.querySelector('script[src="'+src+'"]')){ resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.async = true; s.defer = true;
    s.onload = ()=>resolve();
    s.onerror = ()=>reject(new Error('No se pudo cargar el conector. Revisa tu conexión.'));
    document.head.appendChild(s);
  });
}

// Muestra el mensaje en el alert de la pestaña activa (login o registro).
function socialAlert(msg, ok){
  const activePane = document.querySelector('.pane.on');
  const id = (activePane && activePane.id === 'crear') ? 'regAlert' : 'loginAlert';
  showAlert(id, msg, ok);
}

// Inicia sesión con el id_token de un proveedor social.
async function socialLogin(provider, idToken){
  try{
    const data = await apiPost('/auth/' + provider, { id_token: idToken });
    socialAlert('¡Bienvenido! Entrando…', true);
    saveSessionAndGo(data);
  }catch(err){
    socialAlert(err.message, false);
  }
}

(async function initSocial(){
  let cfg;
  try{
    const r = await fetch(API + '/auth/config');
    cfg = await r.json();
  }catch(e){ return; } // sin config, no mostramos botones sociales
  if(!cfg || (!cfg.google_client_id && !cfg.apple_client_id)) return;

  let shown = false;

  // ── Google Identity Services ──
  if(cfg.google_client_id){
    try{
      await loadScript('https://accounts.google.com/gsi/client');
      if(window.google && google.accounts && google.accounts.id){
        google.accounts.id.initialize({
          client_id: cfg.google_client_id,
          callback: (resp)=>{ if(resp && resp.credential) socialLogin('google', resp.credential); }
        });
        const host = document.getElementById('googleBtnHost');
        const dark = document.documentElement.getAttribute('data-theme') === 'dark';
        google.accounts.id.renderButton(host, {
          theme: dark ? 'filled_black' : 'outline',
          size: 'large',
          shape: 'pill',
          width: 360,
          text: 'continue_with',
          locale: 'es'
        });
        shown = true;
      }
    }catch(e){ /* silencioso: el login normal sigue disponible */ }
  }

  // ── Apple Sign In ──
  if(cfg.apple_client_id){
    try{
      await loadScript('https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js');
      if(window.AppleID && AppleID.auth){
        AppleID.auth.init({
          clientId: cfg.apple_client_id,
          scope: 'name email',
          redirectURI: location.origin + '/acceso.html',
          usePopup: true
        });
        const appleBtn = document.getElementById('appleBtn');
        appleBtn.style.display = 'flex';
        appleBtn.addEventListener('click', async ()=>{
          appleBtn.disabled = true;
          try{
            const res = await AppleID.auth.signIn();
            const idToken = res && res.authorization && res.authorization.id_token;
            if(idToken) await socialLogin('apple', idToken);
            else socialAlert('No se pudo completar el inicio con Apple.', false);
          }catch(err){
            // El usuario canceló o hubo un error; no rompemos la página.
            if(err && err.error && err.error !== 'popup_closed_by_user' && err.error !== 'user_cancelled_authorize'){
              socialAlert('No se pudo iniciar sesión con Apple.', false);
            }
          }finally{
            appleBtn.disabled = false;
          }
        });
        shown = true;
      }
    }catch(e){ /* silencioso */ }
  }

  if(shown) document.getElementById('socialBox').classList.add('on');
})();
</script>
  <script src="i18n.js" defer></script>
</body>
</html>

<style>
:root{
  --bg:#F1EFE5;--bg2:#F7F4EA;--card:#FFFFFF;--card-soft:#EDE9DB;--border:#E1DCCD;
  --text:#17150F;--muted:#5E594B;--muted2:#B3AD9C;--green:#0E8074;--green-ink:#FFFFFF;
  --green-soft:#E3EFE9;--green-glow:rgba(14,128,116,.45);
  --awning:repeating-linear-gradient(90deg,#0E8074 0 26px,#0A5B52 26px 28px,#F8F5EA 28px 54px,#E7E2D1 54px 56px);
  --display:"Bricolage Grotesque",sans-serif;--body:"Instrument Sans",sans-serif;--mono:"Spline Sans Mono",monospace}
html[data-theme="dark"]{
  --bg:#0B1A13;--bg2:#0E2218;--card:#12251B;--card-soft:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);
  --text:#ECEAE0;--muted:#8AA197;--muted2:#5d6f66;--green:#36E27B;--green-ink:#08160F;
  --green-soft:rgba(54,226,123,.12);--green-glow:rgba(54,226,123,.3);
  --awning:repeating-linear-gradient(90deg,#36E27B 0 26px,#0d6b46 26px 28px,#0E2218 28px 54px,#10241A 54px 56px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input{font:inherit}
.awning{height:12px;background:var(--awning)}
.topbar{background:var(--card);color:var(--muted);text-align:center;padding:7px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:14px;border-bottom:1px solid var(--border)}
.topbar b{color:var(--green);font-weight:700}
.theme-tg{display:inline-flex;background:var(--card-soft);border:1px solid var(--border);border-radius:999px;padding:3px}
.theme-tg button{font:700 12.5px 'Instrument Sans',sans-serif;padding:6px 13px;border-radius:999px;cursor:pointer;border:0;background:transparent;color:var(--muted)}
.theme-tg button.on{background:var(--green);color:var(--green-ink)}
.wrap{max-width:480px;margin:0 auto;padding:30px 18px}
h1{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.02em;text-align:center;margin-bottom:6px}
.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:24px}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:22px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg2);color:var(--text);text-align:center;font-family:var(--mono);font-weight:700;font-size:16px;letter-spacing:.1em;text-transform:uppercase;transition:border-color .12s ease,box-shadow .12s ease}
.field input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-weight:700;font-size:15px;padding:14px;border-radius:14px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease}
.btn:active{transform:translateY(1px)}
.btn-teal{background:var(--green);color:var(--green-ink);box-shadow:0 6px 18px -8px var(--green-glow)}
.btn-dark{background:var(--card);border:1.5px solid var(--border);color:var(--text)}
.btn-danger{background:var(--card);border:1.5px solid #E8B5A8;color:#A33A24;font-size:14px;padding:12px}
.btn:disabled{opacity:.55;cursor:not-allowed}
.alert{display:none;font-size:13px;font-weight:600;padding:12px 14px;border-radius:12px;margin-bottom:14px;line-height:1.5}
.alert.err{display:block;background:#FCE8E6;color:#A1281C;border:1px solid #F3C0BA}
.alert.ok{display:block;background:var(--green-soft);color:var(--green);border:1px solid var(--border)}
.detail .row{display:flex;justify-content:space-between;font-size:14.5px;padding:9px 0;border-bottom:1px solid var(--border)}
.detail .row:last-child{border-bottom:0}
.detail .row span:first-child{color:var(--muted)}
.detail .row b{text-align:right}
.statebadge{display:inline-block;font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px}
.statebadge.confirmed{background:var(--green-soft);color:var(--green)}
.statebadge.pending_deposit{background:#FBEFD8;color:#8a5a13}
.statebadge.cancelled_client,.statebadge.cancelled_business{background:var(--card-soft);color:var(--muted)}
.statebadge.completed{background:#E5F6EC;color:#15803D}
.statebadge.no_show{background:#FBE3DC;color:#A33A24}
.bizname{font-family:var(--display);font-weight:800;font-size:20px;text-align:center;margin-bottom:4px}
.view{display:none}.view.on{display:block}
.foot{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:24px 0 40px}
</style>
</head>
<body>
<script>
(function(){var t=localStorage.getItem('bukeame_theme')||'dark';document.documentElement.setAttribute('data-theme',t);
window.__setTheme=function(t){localStorage.setItem('bukeame_theme',t);document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-tg button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-theme-set')===t);});};
document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('[data-theme-set]').forEach(function(b){b.addEventListener('click',function(){window.__setTheme(b.getAttribute('data-theme-set'));});});window.__setTheme(localStorage.getItem('bukeame_theme')||'dark');});})();
</script>
<div class="topbar">Reservas por <b>Buk<span style="color:var(--green)">é</span>ame</b><div class="theme-tg"><button type="button" data-theme-set="light">Claro</button><button type="button" data-theme-set="dark">Oscuro</button></div></div>
<div class="awning"></div>
<div class="wrap">

  <!-- Buscar por código -->
  <div class="view on" id="lookup">
    <h1>Mi cita</h1>
    <p class="sub">Escribe tu código de confirmación para ver o cancelar tu cita.</p>
    <div class="card">
      <div class="alert" id="lookAlert"></div>
      <div class="field"><label>Código de confirmación</label><input id="code" placeholder="XX-0000-000" autocapitalize="characters"></div>
      <button class="btn btn-teal" id="lookBtn">Buscar mi cita →</button>
    </div>
  </div>

  <!-- Detalle de la cita -->
  <div class="view" id="detail">
    <div class="card">
      <div class="bizname" id="dBiz"></div>
      <div style="text-align:center;margin-bottom:14px"><span class="statebadge" id="dState"></span></div>
      <div class="detail">
        <div class="row"><span>Servicio</span><b id="dService"></b></div>
        <div class="row"><span>Profesional</span><b id="dStaff"></b></div>
        <div class="row"><span>Fecha</span><b id="dDate"></b></div>
        <div class="row"><span>Hora</span><b id="dTime"></b></div>
        <div class="row"><span>Precio</span><b id="dPrice"></b></div>
        <div class="row" id="dAddrRow" style="display:none"><span>Dirección</span><b id="dAddr"></b></div>
      </div>
    </div>
    <div class="alert" id="cancelAlert"></div>
    <button class="btn btn-danger" id="cancelBtn" style="margin-bottom:10px">Cancelar mi cita</button>
    <button class="btn btn-dark" id="anotherBtn">Buscar otra cita</button>
  </div>

</div>
<div class="foot">Hecho con Bukéame · bukeame.com</div>

<script>
const API = '/api';
let currentCode = null;

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function money(c){ return '$'+((c||0)/100).toFixed(2); }
function showAlert(id,msg,ok){ const e=document.getElementById(id); if(e){e.textContent=msg; e.className='alert '+(ok?'ok':'err');} }
function clearAlert(id){ const e=document.getElementById(id); if(e){e.className='alert';} }
const STATE_LABELS = {confirmed:'Confirmada',pending_deposit:'Falta depósito',cancelled_client:'Cancelada',cancelled_business:'Cancelada por el negocio',completed:'Completada',no_show:'No asististe'};

// permitir ?code=XXX en la URL
const urlCode = new URLSearchParams(location.search).get('code');
if(urlCode){ document.getElementById('code').value = urlCode; }

document.getElementById('lookBtn').onclick = lookup;
document.getElementById('code').addEventListener('keydown', function(e){ if(e.key==='Enter') lookup(); });

async function lookup(){
  clearAlert('lookAlert');
  const code = document.getElementById('code').value.trim().toUpperCase();
  if(!code){ showAlert('lookAlert','Escribe tu código.',false); return; }
  const btn = document.getElementById('lookBtn'); btn.disabled=true; btn.textContent='Buscando…';
  try{
    const r = await fetch(API+'/public/appointments/'+encodeURIComponent(code));
    const data = await r.json();
    btn.disabled=false; btn.textContent='Buscar mi cita →';
    if(!r.ok){ showAlert('lookAlert', data.error || 'No encontramos esa cita. Revisa el código.', false); return; }
    currentCode = code;
    renderDetail(data.appointment);
  }catch(e){
    btn.disabled=false; btn.textContent='Buscar mi cita →';
    showAlert('lookAlert','Error de conexión. Intenta de nuevo.', false);
  }
}

function renderDetail(a){
  document.getElementById('dBiz').textContent = a.business_name||'';
  const st = a.status||'confirmed';
  const badge = document.getElementById('dState');
  badge.textContent = STATE_LABELS[st]||st;
  badge.className = 'statebadge '+st;
  document.getElementById('dService').textContent = a.service_name||'';
  document.getElementById('dStaff').textContent = a.staff_name||'—';
  const when = new Date(a.starts_at);
  document.getElementById('dDate').textContent = when.toLocaleDateString('es-PR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dTime').textContent = when.toLocaleTimeString('es-PR',{hour:'numeric',minute:'2-digit'});
  document.getElementById('dPrice').textContent = money(a.price_cents);
  if(a.address_line){ document.getElementById('dAddrRow').style.display='flex'; document.getElementById('dAddr').textContent = a.address_line; }
  // mostrar botón cancelar solo si la cita está activa
  const active = (st==='confirmed' || st==='pending_deposit');
  document.getElementById('cancelBtn').style.display = active ? 'flex' : 'none';
  clearAlert('cancelAlert');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('detail').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('cancelBtn').onclick = async function(){
  if(!confirm('¿Seguro que quieres cancelar tu cita?')) return;
  clearAlert('cancelAlert');
  const btn = this; btn.disabled=true; btn.textContent='Cancelando…';
  try{
    const r = await fetch(API+'/public/appointments/'+encodeURIComponent(currentCode)+'/cancel',{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({})
    });
    const data = await r.json();
    btn.disabled=false; btn.textContent='Cancelar mi cita';
    if(!r.ok){ showAlert('cancelAlert', data.error || 'No se pudo cancelar.', false); return; }
    showAlert('cancelAlert','Tu cita fue cancelada. ¡Esperamos verte pronto!', true);
    btn.style.display='none';
    // refrescar el estado
    setTimeout(lookup, 800);
  }catch(e){
    btn.disabled=false; btn.textContent='Cancelar mi cita';
    showAlert('cancelAlert','Error de conexión.', false);
  }
};

document.getElementById('anotherBtn').onclick = function(){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('lookup').classList.add('on');
  document.getElementById('code').value='';
  clearAlert('lookAlert');
};

// si vino con código en la URL, buscar automático
if(urlCode){ lookup(); }
</script>
</body>
</html>

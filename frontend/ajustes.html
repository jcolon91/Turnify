<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajustes — Bukéame</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F1EFE5;--card:#fff;--ink:#17150F;--ink2:#5E594B;--teal:#0E8074;--teal-ink:#0A5B52;--teal-soft:#E3EFE9;--line:#E1DCCD;
--display:"Bricolage Grotesque",sans-serif;--body:"Instrument Sans",sans-serif;--mono:"Spline Sans Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select{font:inherit}
.bootload{min-height:100vh;display:grid;place-items:center;color:var(--ink2);font-size:14px}
.nav{background:var(--card);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.nav a.back{font-size:18px}.nav .logo{font-family:var(--display);font-weight:800;font-size:19px}.nav .logo i{font-style:normal;color:var(--teal)}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 60px}
h1{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.02em;margin-bottom:4px}
.sub{font-size:14px;color:var(--ink2);margin-bottom:22px}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:20px;margin-bottom:14px}
.seclabel{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin-bottom:14px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-weight:600;font-size:14px;margin-bottom:4px}
.field .hint{font-size:12px;color:var(--ink2);margin-bottom:8px}
.field input,.field select{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:12px;background:#FCFBF7}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-weight:700;font-size:15px;padding:14px;border-radius:13px;cursor:pointer;background:var(--teal);color:#fff}
.btn:disabled{opacity:.55}
.alert{display:none;font-size:13px;font-weight:600;padding:12px 14px;border-radius:12px;margin-bottom:14px;line-height:1.5}
.alert.err{display:block;background:#FCE8E6;color:#A1281C;border:1px solid #F3C0BA}
.alert.ok{display:block;background:var(--teal-soft);color:var(--teal-ink);border:1px solid #BFE0D5}
.foot{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding:20px 0 40px}
</style>
</head>
<body>
<div id="boot" class="bootload">Cargando…</div>
<div id="app" style="display:none">
<nav class="nav">
  <a href="panel.html" class="back">←</a>
  <span class="logo">Buk<i>é</i>ame</span>
</nav>
<div class="wrap">
  <h1>Ajustes de reservas</h1>
  <p class="sub">Configura cómo funcionan tus citas.</p>
  <div class="alert" id="alert"></div>

  <div class="card">
    <div class="seclabel">Reservas</div>
    <div class="field">
      <label>Antelación mínima</label>
      <div class="hint">Cuánto tiempo antes deben reservar los clientes.</div>
      <select id="leadMin">
        <option value="0">Sin mínimo</option>
        <option value="30">30 minutos</option>
        <option value="60">1 hora</option>
        <option value="120">2 horas</option>
        <option value="1440">1 día</option>
      </select>
    </div>
    <div class="field">
      <label>Hasta cuándo pueden reservar</label>
      <div class="hint">Cuántos días hacia adelante se puede reservar.</div>
      <select id="horizon">
        <option value="7">1 semana</option>
        <option value="14">2 semanas</option>
        <option value="30">1 mes</option>
        <option value="60">2 meses</option>
        <option value="90">3 meses</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="seclabel">Cancelaciones</div>
    <div class="field">
      <label>Anticipación para cancelar</label>
      <div class="hint">Con cuántas horas de anticipación puede cancelar un cliente.</div>
      <select id="cancelHours">
        <option value="0">En cualquier momento</option>
        <option value="2">2 horas antes</option>
        <option value="6">6 horas antes</option>
        <option value="12">12 horas antes</option>
        <option value="24">24 horas antes</option>
        <option value="48">48 horas antes</option>
      </select>
    </div>
  </div>

  <button class="btn" id="saveBtn">Guardar ajustes</button>
</div>
</div>
<div class="foot">Hecho con Bukéame · bukeame.com</div>

<script>
const API='/api';
const token=localStorage.getItem('bukeame_token');
if(!token){ location.href='acceso.html'; }

function showAlert(m,ok){ const e=document.getElementById('alert'); e.textContent=m; e.className='alert '+(ok?'ok':'err'); window.scrollTo({top:0,behavior:'smooth'}); }

async function api(method,path,body){
  const opts={method,headers:{'Authorization':'Bearer '+token}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  const r=await fetch(API+path,opts);
  if(r.status===401){localStorage.clear();location.href='acceso.html';throw new Error('s');}
  let data={};try{data=await r.json();}catch(e){}
  return {status:r.status,ok:r.ok,data};
}

async function boot(){
  const r=await api('GET','/businesses/me');
  if(r.status===404){ location.href='panel.html'; return; }
  if(!r.ok){ document.getElementById('boot').textContent='No se pudo cargar.'; return; }
  const b=r.data.business;
  // setear valores actuales
  setSelect('leadMin', b.booking_lead_min);
  setSelect('horizon', b.booking_horizon_days);
  setSelect('cancelHours', b.cancellation_hours);
  document.getElementById('boot').style.display='none';
  document.getElementById('app').style.display='block';
}
function setSelect(id,val){
  const sel=document.getElementById(id);
  const v=String(val);
  for(const o of sel.options){ if(o.value===v){ sel.value=v; return; } }
  // si no hay match exacto, dejar el más cercano por defecto
}

document.getElementById('saveBtn').onclick=async function(){
  const btn=this; btn.disabled=true; btn.textContent='Guardando…';
  const body={
    booking_lead_min: parseInt(document.getElementById('leadMin').value,10),
    booking_horizon_days: parseInt(document.getElementById('horizon').value,10),
    cancellation_hours: parseInt(document.getElementById('cancelHours').value,10)
  };
  const r=await api('PATCH','/businesses/me',body);
  btn.disabled=false; btn.textContent='Guardar ajustes';
  showAlert(r.ok?'¡Ajustes guardados!':(r.data.error||'No se pudo guardar.'), r.ok);
};

boot();
</script>
</body>
</html>
